<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VivendasPark MVP</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef2ff, #dbeafe);
      color: #0f172a;
      padding: 24px;
    }

    .card {
      width: min(420px, 100%);
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
      padding: 28px;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>VivendasPark MVP</h1>
    <button id="testButton" type="button">Clique para testar</button>
  </main>

  <script>
    document.getElementById('testButton').addEventListener('click', function () {
      alert('Aplicação funcionando 🚀');
    });
  </script>
</body>
</html>
